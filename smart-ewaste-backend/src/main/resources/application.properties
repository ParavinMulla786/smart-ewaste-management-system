# ===========================================
# APPLICATION CONFIGURATION
# ===========================================
spring.application.name=smart-ewaste-backend
server.port=${SERVER_PORT:8080}

# ===========================================
# MONGODB CONFIGURATION
# ===========================================
# Use environment variables for MongoDB configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ewaste_db}
spring.data.mongodb.database=${MONGODB_DATABASE:ewaste_db}

# Optional: If you have authentication enabled on MongoDB
# spring.data.mongodb.username=${MONGODB_USERNAME}
# spring.data.mongodb.password=${MONGODB_PASSWORD}

# ===========================================
# JWT CONFIGURATION
# ===========================================
# IMPORTANT: Set JWT_SECRET environment variable in production!
# Generate a strong secret: openssl rand -base64 64
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationMustBeAtLeast256BitsLong1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
# JWT expiration time in milliseconds (86400000 ms = 24 hours)

# ===========================================
# EMAIL CONFIGURATION
# ===========================================
# Use environment variables for email configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Application URL for email links
app.url=${APP_URL:http://localhost:3000}

# ===========================================
# LOGGING CONFIGURATION
# ===========================================
logging.level.root=${LOGGING_LEVEL:INFO}
logging.level.com.ewaste=${LOGGING_LEVEL:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL:DEBUG}
logging.level.org.springframework.web=${LOGGING_LEVEL:DEBUG}

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===========================================
# CORS CONFIGURATION (handled in code)
# ===========================================
# Frontend URL for CORS - Use environment variable
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002}

# ===========================================
# ERROR HANDLING
# ===========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ===========================================
# AWS S3 CONFIGURATION
# ===========================================
# Enable/disable AWS S3 integration
aws.enabled=${AWS_ENABLED:false}
# Use environment variables for AWS credentials (NEVER commit credentials to Git!)
aws.accessKeyId=${AWS_ACCESS_KEY_ID:YOUR_AWS_ACCESS_KEY_ID}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:YOUR_AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION:us-east-1}
# S3 bucket name
aws.s3.bucketName=${AWS_S3_BUCKET_NAME:smart-ewaste-bucket}

# ===========================================
# FILE UPLOAD CONFIGURATION
# ===========================================
# Maximum file size (5MB)
spring.servlet.multipart.max-file-size=5MB
# Maximum request size (10MB)
spring.servlet.multipart.max-request-size=10MB
